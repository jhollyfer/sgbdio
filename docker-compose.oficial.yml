name: sgbdio

services:
  postgres:
    image: postgres:16-alpine
    container_name: sgbdio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-sgbdio}
    volumes:
      - sgbdio-postgres-data:/var/lib/postgresql/data
    networks:
      - sgbdio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres} -d ${DATABASE_NAME:-sgbdio}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: sgbdio-redis
    restart: unless-stopped
    volumes:
      - sgbdio-redis-data:/data
    networks:
      - sgbdio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: marcosjhollyfer/sgbdio-api:latest
    container_name: sgbdio-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${DATABASE_USERNAME:-postgres}:${DATABASE_PASSWORD:-postgres}@postgres:5432/${DATABASE_NAME:-sgbdio}
      REDIS_URL: redis://redis:6379
    ports:
      - "${APPLICATION_SERVER_PORT:-3000}:3000"
    volumes:
      - sgbdio-storage:/app/_storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sgbdio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health-check"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    image: marcosjhollyfer/sgbdio-app:latest
    container_name: sgbdio-app
    restart: unless-stopped
    env_file: .env
    environment:
      SERVER_URL: ${APPLICATION_SERVER_URL:-http://api:3000}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-sgbdio}
    ports:
      - "${APPLICATION_CLIENT_PORT:-5173}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sgbdio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  sgbdio-postgres-data:
    driver: local
  sgbdio-redis-data:
    driver: local
  sgbdio-storage:
    driver: local

networks:
  sgbdio-network:
    driver: bridge
